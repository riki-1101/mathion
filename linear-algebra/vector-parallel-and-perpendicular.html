<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>ベクトルの平行と垂直</title>
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/mathjax.js"></script>
    </head>
    <body>
        <header id="header"></header>
        <aside id="sidebar"></aside>
        <main id="contents">
            <h1>ベクトルの平行と垂直</h1>
            <div id="table-of-contents"></div>
            <section id="1">
                <h2>ベクトルの平行</h2>
                <figure class="th">
                    <figcaption>定理（ベクトルの平行条件）</figcaption>
                    <p class="indent">
                        幾何ベクトル \(\boldsymbol{a},\boldsymbol{b}\neq\boldsymbol{0}\) に対して
                    </p>
                    <div class="math">
                        \[
                        \exists k\in\mathbb{R},\quad\boldsymbol{b}=k\boldsymbol{a}
                        \]
                    </div>
                    <p>
                        が成り立つとき、\(\boldsymbol{a}\) と \(\boldsymbol{b}\) は<strong>平行</strong>であるといい
                    </p>
                    <div class="math">
                        \[
                        \boldsymbol{a}~//~\boldsymbol{b}
                        \]
                    </div>
                    <p>
                        と表す。
                    </p>
                </figure>
            </section>
            <section id="2">
                <h2>ベクトルの垂直</h2>
                <figure class="th">
                    <figcaption>定理（ベクトルの垂直条件）</figcaption>
                    <p class="indent">
                        幾何ベクトル \(\boldsymbol{a},\boldsymbol{b}\neq\boldsymbol{0}\) に対して
                    </p>
                    <div class="math">
                        \[
                        \boldsymbol{a}\cdot\boldsymbol{b}=0
                        \]
                    </div>
                    が成り立つとき、\(\boldsymbol{a}\) と \(\boldsymbol{b}\) は<strong>垂直</strong>であるといい
                    <div class="math">
                        \[
                        \boldsymbol{a}\perp\boldsymbol{b}
                        \]
                    </div>
                    <p>
                        と表す。
                    </p>
                </figure>
            </section>
        </main>
        <footer id="footer"></footer>
        <script src="../js/header.js"></script>
        <script src="../js/sidebar.js"></script>
        <script src="../js/footer.js"></script>
        <script src="../js/script.js"></script>
    </body>
</html>
