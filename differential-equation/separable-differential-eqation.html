            <h1>変数分離形</h1>
            <div id="table-of-contents"></div>
            <section id="1">
                <h2>変数分離形とは</h2>
                <div class="math">
                    \[
                    \frac{dy}{dx}=f(x)g(y)
                    \]
                </div>
                <p>
                    のように、\(\displaystyle\frac{dy}{dx}=\) (\(x\) の式)×(\(y\) の式)と表せる微分方程式を<strong>変数分離形</strong>といいます。
                </p>
            </section>
            <section id="2">
                <h2>変数分離形の解法</h2>
                <p class="indent">
                    変数分離形の微分方程式は、次の手順で解くことができます。
                </p>
                <figure class="th">
                    <figcaption>解法（変数分離形）</figcaption>
                    <div class="math">
                        \[
                        \frac{dy}{dx}=f(x)g(y)
                        \]
                    </div>
                    <ol>
                        <li>
                            \(g(y)=0\) のときを考える。
                        </li>
                        <li>
                            \(g(y)\neq0\) のとき、両辺を \(g(y)\) で割る。
                            <div class="math">
                                \[
                                \frac{1}{g(y)}\frac{dy}{dx}=f(x)
                                \]
                            </div>
                        </li>
                        <li>
                            両辺を \(x\) で積分する。
                            <div class="math">
                                \[
                                \begin{align}
                                &\int\frac{1}{g(y)}\frac{dy}{dx}dx=\int f(x)dx \\
                                \\
                                &\Longleftrightarrow \quad \int\frac{1}{g(y)}dy=\int f(x)dx
                                \end{align}
                                \]
                            </div>
                        </li>
                        <li>
                            両辺の積分をそれぞれ計算して解を求める。
                        </li>
                    </ol>
                </figure>
                
                <p class="indent">
                    また、次のように形式的に理解することもできます。
                </p>
                <figure class="box">
                    <figcaption>変数分離形の形式的な解法</figcaption>
                    <ol>
                        <li>
                            左辺を \(y\) のみ、右辺を \(x\) のみにする。
                            <div class="math">
                                \[
                                \frac{1}{g(y)}dy=f(x)dx
                                \]
                            </div>
                        </li>
                        <li>
                            両辺に積分記号をつける。
                            <div class="math">
                                \[
                                \int\frac{1}{g(y)}dy=\int f(x)dx
                                \]
                            </div>
                        </li>
                    </ol>
                </figure>
            </section>
            <section id="3">
                <h2>例題</h2>
                <figure class="ex-problem">
                    <figcaption>例題</figcaption>
                    <p class="indent">
                        次の微分方程式を解け。
                    </p>
                    <div class="math">
                        \[
                        \frac{dy}{dx}=\frac{xy}{x^2+1}
                        \]
                    </div>
                </figure>
                <figure class="ex-answer">
                    <figcaption>解答例</figcaption>
                    <p>
                        \(y\neq0\) のとき
                    </p>
                    <div class="math">
                        \[
                        \frac{1}{y}\cdot\frac{dy}{dx}=\frac{x}{x^2+1}
                        \]
                    </div>
                    <p>
                        両辺を \(x\) で積分すると
                    </p>
                    <div class="math">
                        \[
                        \begin{align}
                        \int\frac{1}{y}dy&=\int\frac{x}{x^2+1}dx\\
                        \log |y|&=\frac{1}{2}\log(x^2+1)+C_1\\
                        \log |y|&=\log\sqrt{x^2+1}+C_1\\
                        |y|&=e^{\log\sqrt{x^2+1}+C_1}\\
                        y&=\pm e^{C_1}\sqrt{x^2+1}\\
                        y&=C\sqrt{x^2+1}
                        \end{align}
                        \]
                    </div>
                    <p>
                        また、\(y=0\) という定数関数は与えられた微分方程式を満たすが、これは \(C=0\) の場合に相当する。
                    </p>
                    <p>
                        したがって、求める解は
                    </p>
                    <div class="math">
                        \[
                        y=C\sqrt{x^2+1} \quad (C ~\textbf{は任意定数})
                        \]
                    </div>
                </figure>
            </section>
