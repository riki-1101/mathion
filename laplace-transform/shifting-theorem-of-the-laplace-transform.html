            <section id="1">
                <h2>ラプラス変換の移動法則</h2>
                <figure class="th">
                    <figcaption>定理（ラプラス変換の移動法則）</figcaption>
                    <p class="indent">
                        \(a\in\mathbb{C}\) とし、関数 \(f(t)\) のラプラス変換を \(F(s)\) とするとき、次が成り立つ。
                    </p>
                    <div class="math">
                        \[
                        \mathscr{L}[e^{at}f(t)]=F(s-a)
                        \]
                    </div>
                </figure>
                <p class="indent">
                    この公式により、\(f(t)\) のラプラス変換がわかっていれば、それを平行移動することで、\(e^{at}f(t)\) のラプラス変換が求められます。
                </p>
                <p class="indent">
                    証明は次のようになります。
                </p>
                <div class="math">
                    \[
                    \begin{align}
                    \mathscr{L}[e^{at}f(t)]
                    &= \int_0^\infty e^{at}f(t)e^{-st}dt \\
                    &= \int_0^\infty f(t)e^{-(s-a)t}dt \\
                    &= F(s-a)
                    \end{align}
                    \]
                </div>
            </section>
            <section id="">
                <h2>三角関数のラプラス変換の存在</h2>
                
                <figure class="ex-problem">
                    <figcaption>例題1</figcaption>
                    <p class="indent">
                        次の関数 \(f(t)\) のラプラス変換 \(F(s)\) を求めよ。
                    </p>
                    <div class="math">
                        \[
                        f(t)=
                        \begin{cases}
                        0 & (t \lt 0) \\
                        1 & (t \ge 0)
                        \end{cases}
                        \]
                    </div>
                </figure>
                <figure class="ex-answer">
                    <figcaption>解答例</figcaption>
                    <div class="math">
                        \[
                        \begin{align}
                        F(s) &= \int_0^\infty1\cdot e^{-st}dt \\
                        &= \left[-\frac{1}{s}e^{-st}\right]_0^\infty \\
                        &= \frac{1}{s} \quad (\operatorname{Re}s\gt0)
                        \end{align}
                        \]
                    </div>
                </figure>
            </section>
