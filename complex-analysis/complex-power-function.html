            <section id="1">
                <h2>複素べき関数の定義</h2>
                <p class="indent">
                    実関数でのべき関数は、\(x\neq0\) と \(a\in\mathbb{R}\) に対して
                </p>
                <div class="math">
                    \[
                    x^a=x^{\log x^a}=x^{a\log x}
                    \]
                </div>
                <p>
                    と書くことができます。
                    これをそのまま複素数に拡張して、次のように<strong>複素べき関数</strong>を定義します。
                    ただし、複素対数関数が含まれるため、複素べき関数も多価関数となります。
                </p>
                <figure class="def">
                    <figcaption>定義（複素べき関数）</figcaption>
                    <p class="indent">
                        複素数 \(z\neq0\) と \(\alpha\in\mathbb{C}\) に対して
                    </p>
                    <div class="math">
                        \[
                        z^\alpha=e^{\alpha\log z}
                        \]
                    </div>
                    <p>
                        で定まる多価関数を<strong>複素べき関数</strong>という。
                    </p>
                </figure>
            </section>
            <section id="2">
                <h2>複素べき関数の計算</h2>

                    </p>
