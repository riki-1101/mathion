            <h1>ローレンツ曲線</h1>
            <div id="table-of-contents"></div>
            <section id="1">
                <h2>ローレンツ曲線とは</h2>
                <p class="indent">
                    <strong>ローレンツ曲線</strong>は、分布の不平等さを視覚的に表すためのグラフです。
                    主に所得や資産の分布に対して用いられます。
                    横軸に<strong>データ数の累積相対度数</strong>、縦軸に<strong>データの値の累積相対度数</strong>をプロットします。
                </p>
                <p class="indent">
                    ローレンツ曲線の書き方は次の通りです。
                </p>
                <figure class="box">
                    <figcaption>ローレンツ曲線の作成手順</figcaption>
                    <p class="indent">
                        データを \(x_1,x_2,\cdots,x_n\) とする。
                    </p>
                    <ol>
                        <li>
                            データ数の累積相対度数を求める。
                            <div class="math">
                                \[
                                \frac{1}{n},\frac{2}{n},\cdots,\frac{n}{n}
                                \]
                            </div>
                        </li>
                        <li>
                            データの値の合計を求める。
                            <div class="math">
                                \[
                                S=\sum_{i=1}^nx_{i}
                                \]
                            </div>
                        </li>
                        <li>
                            データを小さい順に並べる。
                            <div class="math">
                                \[
                                x_{(1)} \le x_{(2)} \le \cdots \le x_{(n)}
                                \]
                            </div>
                        </li>
                        <li>
                            データの値の累積相対度数を求める。
                            <div class="math">
                                \[
                                \frac{x_{(1)}}{S},\frac{x_{(1)}+x_{(2)}}{S},\cdots,\frac{x_{(1)}+x_{(2)}+\cdots+x_{(n)}}{S}
                                \]
                            </div>
                        </li>
                        <li>
                            データ数の累積相対度数を横軸、データの値の累積相対度数を縦軸に、原点を含めてプロットする。
                        </li>
                    </ol>
                </figure>
                <p class="indent">
                    データ数が多すぎる場合は、階級に等分して、各階級の合計を用いてプロットすることがあります。
                    例えば、5万個のデータに対して、小さい順に並べて1万個ずつ区切り、階級ごとに合計を求めます。
                    この各合計をデータとして累積相対度数を計算します。
                </p>
