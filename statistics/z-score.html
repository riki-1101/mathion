        <main id="contents">
            <h1>データの変換</h1>
            <div id="table-of-contents"></div>
            <section id="1">
                <h2>標準化</h2>
                <figure class="def">
                    <figcaption>定義（標準化）</figcaption>
                    <p class="indent">
                        データ \(x_1,x_2,\cdots,x_n\) に対して、平均 \(\overline{x}\) 、標準偏差 \(s_x\) によって
                    </p>
                    <div class="math">
                        \[
                        z_i=\frac{x_i-\overline{x}}{s_x} \quad (i=1,2,\cdots,n)
                        \]
                    </div>
                    <p>
                        という変換を<strong>標準化</strong>といい、\(z_i\) をデータ \(x_i\) の<strong>標準化得点</strong>という。
                    </p>
                </figure>
                <p class="indent">
                    偏差値は標準化得点を用いて定義されます。
                </p>
                <figure class="def">
                    <figcaption>定義（偏差値得点）</figcaption>
                    <p class="indent">
                        データの標準化得点 \(z_i\) に対して
                    </p>
                    <div class="math">
                        \[
                        T_i=10z_i+50
                        \]
                    </div>
                    <p>
                        をデータの<strong>偏差値得点</strong>という。
                    </p>
                </figure>
            </section>
            <section id="2">
                <h2>正規化</h2>
                <figure class="def">
                    <figcaption>定義（正規化）</figcaption>
                    <p class="indent">
                        データ \(x_1,x_2,\cdots,x_n\) に対して、最大値 \(x_{\mathrm{max}}\) 、最小値 \(x_{\mathrm{min}}\) によって
                    </p>
                    <div class="math">
                        \[
                        x_{\mathrm{norm}}=\frac{x-x_{\mathrm{min}}}{x_{\mathrm{max}}-x_{\mathrm{min}}} \quad (i=1,2,\cdots,n)
                        \]
                    </div>
                    <p>
                        という変換を<strong>正規化</strong>という。
                    </p>
                </figure>
            </section>
