<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>研究計画</title>
        <link rel="stylesheet" href="../css/style.css">
        <script src="../js/mathjax.js"></script>
    </head>
    <body>
        <header id="header"></header>
        <aside id="sidebar"></aside>
        <main id="contents">
            <h1>研究計画</h1>
            <div id="table-of-contents"></div>
            <section id="1">
                <h2>研究の種類</h2>
                <p class="indent">
                    研究は、大きく分けて次のように２種類に分類されます。
                </p>
                <figure class="box">
                    <figcaption>研究の種類</figcaption>
                    <ul>
                        <li>
                            <strong>実験研究</strong><br>
                            研究の条件設定に、調査者が介入する研究。
                        </li>
                        <li>
                            <strong>観察研究</strong><br>
                            研究の条件設定に、調査者が介入しない研究。
                        </li>
                    </ul>
                </figure>
            </section>
            <section id="2">
                <h2>実験研究の例</h2>
                <p>
                    ランダム化比較試験
                </p>
                <p>
                    クロスオーバー試験
                </p>
            </section>
            <section id="3">
                <h2>観察研究の例</h2>
                <p>
                    コホート研究
                </p>
                <p>
                    ケースコントロール研究
                </p>
                <p>
                    横断研究
                </p>
            </section>
            <section id="ex">
                <h2>演習問題</h2>
                <figure class="ex-practice">
                    <figcaption>問題</figcaption>
                            
                </figure>
                <details class="ans">
                    <summary>解答</summary>
                    
                </details>
            </section>
        </main>
        <footer id="footer"></footer>
        <script src="../js/header.js"></script>
        <script src="../js/sidebar.js"></script>
        <script src="../js/footer.js"></script>
        <script src="../js/script.js"></script>
    </body>
</html>
