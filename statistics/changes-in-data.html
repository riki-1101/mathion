            <h1>変化率と伸び率</h1>
            <div id="table-of-contents"></div>
            <section id="1">
                <h2>変化量</h2>
                <p class="indent">
                    ある時点の値とその次の時点の値の差を見て、どれくらい変化したのかを調べます。
                </p>
                <figure class="def">
                    <figcaption>定義（差分）</figcaption>
                    <p class="indent">
                        時系列データ \(\{x_t\}_{t=0}^T\) に対して
                    </p>
                    <div class="math">
                        \[
                        \Delta x_t=x_t-x_{t-1} \quad (t=1,\cdots,T)
                        \]
                    </div>
                    <p>
                        を<strong>差分</strong>という。
                    </p>
                </figure>
            </section>
            <section id="2">
                <h2>変化率と伸び率</h2>
                <p class="indent">
                    ある時点の値が、前の時点に比べて何倍になったかを調べるとき、<strong>変化率</strong>を使います。
                </p>
                <figure class="def">
                    <figcaption>定義（変化率）</figcaption>
                    <p class="indent">
                        時系列データ \(\{x_t\}_{t=0}^T\) に対して
                    </p>
                    <div class="math">
                        \[
                        p_t=\frac{x_t-x_{t-1}}{x_{t-1}} \quad (t=1,\cdots,T)
                        \]
                    </div>
                    <p>
                        を<strong>変化率</strong>という。
                    </p>
                </figure>
                <figure class="def">
                    <figcaption>定義（伸び率）</figcaption>
                    <p class="indent">
                        時系列データ \(\{x_t\}_{t=0}^T\) に対して
                    </p>
                    <div class="math">
                        \[
                        r_t=\frac{x_t}{x_{t-1}} \quad (t=1,\cdots,T)
                        \]
                    </div>
                    <p>
                        を<strong>伸び率</strong>という。
                    </p>
                </figure>
                <p class="indent">
                    変化率 \(p_t\) と伸び率 \(r_t\) の定義から
                </p>
                <div class="math">
                    \[
                    p_t=r_t-1
                    \]
                </div>
                <p>
                    が成り立ちます。
                </p>
                <figure class="def">
                    <figcaption>定義（平均伸び率）</figcaption>
                    <p class="indent">
                        時系列データ \(\{x_t\}_{t=0}^T\) に対して
                    </p>
                    <div class="math">
                        \[
                        r_G=\left(\prod_{t=1}^T\frac{x_t}{x_{t-1}}\right)^{\frac{1}{T}}
                        \]
                    </div>
                    <p>
                        を<strong>平均伸び率</strong>という。
                    </p>
                </figure>
            </section>
